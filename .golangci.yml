version: "2"

linters:
  enable:
    - govet
    - staticcheck
    - unused
    - ineffassign
    - bodyclose
    - noctx
    - unparam
    - misspell
  disable:
    - errcheck

  settings:
    govet:
      enable-all: true
      disable:
        - shadow
        - fieldalignment

  exclusions:
    rules:
      - path: "_test\\.go"
        linters:
          - unparam
          - unused
      - path: "tests/"
        linters:
          - noctx

formatters:
  enable:
    - gofmt

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
